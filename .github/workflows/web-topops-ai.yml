name: TopOps AI Web

on:
  push:
    branches:
      - main
    paths:
      - web/topops-ai/**
      - .github/workflows/web-topops-ai.yml
  workflow_dispatch:

jobs:
  build:
    name: Build web app
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/topops-ai/package-lock.json

      - name: Install dependencies
        working-directory: web/topops-ai
        run: npm ci

      - name: Build
        working-directory: web/topops-ai
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GOOGLE_GEMINI_API_KEY: ${{ secrets.GOOGLE_GEMINI_API_KEY }}
        run: npm run build
