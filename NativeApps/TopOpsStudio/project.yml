name: TopOpsStudio

options:
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: 5.0
    PRODUCT_BUNDLE_IDENTIFIER: com.topwnz.TopOpsStudio
    PRODUCT_NAME: TopOpsStudio
    TARGETED_DEVICE_FAMILY: "1"
    GENERATE_INFOPLIST_FILE: YES
    INFOPLIST_KEY_CFBundleDisplayName: TopOps Studio
    INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.productivity
    INFOPLIST_KEY_LSSupportsOpeningDocumentsInPlace: YES
    INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
    INFOPLIST_KEY_UIFileSharingEnabled: YES
    INFOPLIST_KEY_NSPhotoLibraryUsageDescription: TopOps Studio uses Photos to import screenshots for on-device OCR.
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone:
      - UIInterfaceOrientationPortrait
    IPHONEOS_DEPLOYMENT_TARGET: "16.0"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""

targets:
  TopOpsStudio:
    type: application
    platform: iOS
    sources:
      - path: .
        excludes:
          - README.md
          - project.yml
    settings:
      base:
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 0.1.0
        CODE_SIGN_ENTITLEMENTS: TopOpsStudio.entitlements
    scheme:
      testTargets: []
